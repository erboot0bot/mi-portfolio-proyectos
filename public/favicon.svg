<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="hex">
      <polygon points="50,2 95,26 95,74 50,98 5,74 5,26"/>
    </clipPath>
  </defs>
  <g clip-path="url(#hex)">
    <!-- White background -->
    <rect width="100" height="100" fill="white"/>
    <!-- Left bar (orange) full height -->
    <rect x="0" y="0" width="38" height="100" fill="#E8651A"/>
    <!-- Right bar top (green) -->
    <rect x="62" y="0" width="38" height="45" fill="#3CB043"/>
    <!-- Right bar bottom (orange) -->
    <rect x="62" y="45" width="38" height="55" fill="#E8651A"/>
    <!-- Crossbar (orange) — horizontal connector of H, centered ~y=38-52 -->
    <rect x="38" y="38" width="24" height="14" fill="#E8651A"/>
    <!-- Purple accent (lower H window) -->
    <polygon points="38,58 56,58 48,72 38,72" fill="#7040C0"/>
  </g>
</svg>
