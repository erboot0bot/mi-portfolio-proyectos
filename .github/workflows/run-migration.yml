name: Run DB Migration (one-shot)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql
        run: sudo apt-get install -y postgresql-client -q

      - name: Run migration
        run: |
          psql "$POSTGRES_URL" <<'SQL'
            ALTER TABLE projects DROP CONSTRAINT IF EXISTS projects_slug_key;
            ALTER TABLE projects ADD CONSTRAINT projects_slug_owner_unique UNIQUE (slug, owner_id);
            SELECT conname FROM pg_constraint WHERE conrelid = 'projects'::regclass AND conname LIKE '%slug%';
          SQL
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
